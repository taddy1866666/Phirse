<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phirse - Login</title>
    <link rel="icon" type="image/png" href="uploads/images/Plogo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { text-align: center; max-width: 900px; }
        .logo { margin-bottom: 30px; }
        .logo img { height: 80px; width: auto; }
        h1 { color: white; font-size: 48px; margin-bottom: 10px; font-weight: 700; }
        .subtitle { color: rgba(255,255,255,0.9); font-size: 18px; margin-bottom: 50px; }
        .roles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-bottom: 30px; }
        .role-card { background: white; border-radius: 15px; padding: 40px 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); transition: all 0.3s ease; text-decoration: none; color: inherit; }
        .role-card:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(0,0,0,0.2); }
        .role-icon { font-size: 48px; margin-bottom: 15px; height: 60px; display: flex; align-items: center; justify-content: center; }
        .role-card.student .role-icon { color: #667eea; }
        .role-card.seller .role-icon { color: #f093fb; }
        .role-card.admin .role-icon { color: #4facfe; }
        .role-card h2 { font-size: 24px; margin-bottom: 10px; color: #333; }
        .role-card p { color: #666; font-size: 14px; margin-bottom: 20px; min-height: 40px; }
        .btn { display: inline-block; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; border: none; cursor: pointer; font-size: 16px; }
        .role-card.student .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .role-card.student .btn:hover { transform: scale(1.05); }
        .role-card.seller .btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .role-card.seller .btn:hover { transform: scale(1.05); }
        .role-card.admin .btn { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        .role-card.admin .btn:hover { transform: scale(1.05); }
        .footer { color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 40px; }
        @media (max-width: 768px) {
            h1 { font-size: 36px; }
            .roles-grid { grid-template-columns: 1fr; gap: 20px; }
            .role-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="uploads/images/Plogo.png" alt="Phirse Logo">
        </div>
        <h1>Phirse</h1>
        <p class="subtitle">Order Management System | PLV Supreme Student Council</p>
        <div class="roles-grid">
            <a href="student/login.php" class="role-card student">
                <i class="fas fa-user-graduate role-icon"></i>
                <h2>Student</h2>
                <p>Browse and order products from student organizations</p>
                <button class="btn">Login as Student</button>
            </a>
            <a href="seller/login.php" class="role-card seller">
                <i class="fas fa-store role-icon"></i>
                <h2>Organization</h2>
                <p>Manage your organization's store and orders</p>
                <button class="btn">Login as Seller</button>
            </a>
            <a href="admin/login.php" class="role-card admin">
                <i class="fas fa-crown role-icon"></i>
                <h2>Admin</h2>
                <p>SSC administration and platform management</p>
                <button class="btn">Login as Admin</button>
            </a>
        </div>
        <div class="footer">
            <p>&copy; 2026 Phirse | Supreme Student Council, PLV</p>
        </div>
    </div>
</body>
</html>
