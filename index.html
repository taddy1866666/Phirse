<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phirse - Redirecting</title>
    <script>
        window.location.href = '/student/login.php';
    </script>
    <link rel="icon" type="image/png" href="uploads/images/Plogo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Loading Animation */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        .loading-content {
            text-align: center;
            color: white;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 20px;
        }

        .loading-text {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        :root {
            --primary-color: #667eea;
            --primary-dark: #764ba2;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --bg-primary: #F8FAFC;
            --bg-secondary: #F1F5F9;
            --error-color: #EF4444;
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: containerFadeIn 1s ease-out;
            margin: 20px;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            opacity: 0.95;
            z-index: 0;
        }

        .login-section {
            flex: 1;
            padding: 4rem;
            position: relative;
            z-index: 1;
        }

        .brand-section {
            flex: 1;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem;
            position: relative;
            z-index: 1;
        }

        .app-logo {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-form {
            max-width: 400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .brand-name {
            font-size: 3.5rem;
            color: #ffffff;
            margin-bottom: 1.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.5;
        }

        .brand-section .subtitle {
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .input-icon {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon i.fa-user-circle,
        .input-icon i.fa-key {
            position: absolute;
            left: 1rem;
            color: #94A3B8;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-icon i.toggle-password {
            position: absolute;
            right: 1rem;
            left: auto;
            color: #94A3B8;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 8px;
            z-index: 1;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .form-group input {
            width: 100%;
            padding: 16px 48px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-weight: 500;
            outline: none;
        }

        .form-group input::placeholder {
            color: #94A3B8;
            font-weight: 400;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background-color: white;
        }

        .form-group input:focus + i {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.35);
            filter: brightness(1.05);
        }

        .login-btn:active {
            transform: translateY(1px);
            filter: brightness(0.95);
        }

        .login-btn.loading .btn-text {
            visibility: hidden;
        }

        .login-btn .btn-spinner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .login-btn.loading {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            opacity: 0.8;
            cursor: not-allowed;
            transform: scale(0.98);
        }

        .login-btn.loading .btn-text,
        .login-btn.loading .btn-icon {
            opacity: 0;
        }

        .login-btn.loading .btn-spinner {
            display: block;
        }

        .login-btn.success {
            background: #10B981;
        }

        .login-btn.error {
            background: #EF4444;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            color: var(--error-color);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 16px;
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 14px;
            text-align: center;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }



        @media (max-width: 768px) {
            body {
                padding: 15px;
                background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            }

            .container {
                flex-direction: column;
                margin: 0;
                box-shadow: none;
                max-width: 400px;
            }

            .login-section {
                padding: 2rem;
                background: white;
                border-radius: 24px;
            }

            .brand-section {
                display: none;
            }

            .container::before {
                display: none;
            }

            .app-logo {
                font-size: 2.5rem;
                margin-bottom: 1.5rem;
            }

            h1 {
                font-size: 2rem;
                margin-bottom: 0.5rem;
            }

            .subtitle {
                font-size: 1rem;
                margin-bottom: 2rem;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            .form-group input {
                padding: 14px 42px;
                font-size: 15px;
            }

            .input-icon i {
                font-size: 16px;
            }

            .toggle-password {
                right: 14px;
                padding: 8px;
            }

            .login-btn {
                padding: 14px 20px;
                font-size: 15px;
                margin-top: 0.5rem;
            }
        }

        @media (max-width: 380px) {
            body {
                padding: 10px;
            }

            .container {
                margin: 0;
            }

            .login-section {
                padding: 1.5rem;
            }

            .app-logo {
                font-size: 2.25rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .form-group input {
                padding: 13px 40px;
                font-size: 14px;
            }
        }

        /* Loading animation */
        .spinner {
            display: none;
        }

        .login-btn.loading .spinner {
            display: block;
        }

        /* Brand image/icon styles */
        .brand-section img {
            max-width: 200px;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading PHIRSE...</div>
        </div>
    </div>
    <div class="container">
        <div class="login-section">
            <div class="login-form">
                <div class="app-logo" style="text-align: center; width: 100%;">
                    <i class="fas fa-shopping-bag"></i>
                </div>
                <h1>Welcome Back!</h1>
                <p class="subtitle">Sign in to continue to Phirse</p>
                
                <form id="loginForm" action="unified-auth.php" method="POST">
                    <div class="form-group">
                        <div class="input-icon">
                            <i class="fas fa-user-circle"></i>
                            <input type="text" id="user_id" name="user_id" placeholder="User ID or Organization Name" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <div class="input-icon">
                            <i class="fas fa-key"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <button type="submit" class="login-btn" id="loginButton">
                        <span class="btn-text">Login to Dashboard</span>
                        <i class="fas fa-arrow-right btn-icon"></i>
                        <div class="btn-spinner"></div>
                    </button>
                </form>
                <div id="error-message" class="error-message"></div>
            </div>
        </div>
        <div class="brand-section">
            <div class="brand-content">
                <h1 class="brand-name">Phirse</h1>
                <p class="subtitle">PLV Student Marketplace</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // Loading animation
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.querySelector('.loading-overlay').classList.add('fade-out');
                setTimeout(function() {
                    document.querySelector('.loading-overlay').style.display = 'none';
                }, 500);
            }, 1000);
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const loginBtn = document.getElementById('loginButton');
            const userId = document.getElementById('user_id').value;
            const password = document.getElementById('password').value;

            if (!userId || !password) {
                showError('Please fill in all fields');
                return;
            }

            // Show loading state
            loginBtn.classList.add('loading');
            
            // Submit the form
            this.submit();
        });

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 3000);
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
